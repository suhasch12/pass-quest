# ─── Netlify configuration for Genius Quest ───────────────────────────────────

[build]
  publish = "."

# ─── Cache headers ────────────────────────────────────────────────────────────
# index.html: never cache (always get the latest version)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# API functions: never cache
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Fonts: cache for 1 year (they never change between deploys)
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Security + bandwidth headers ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─── Redirect www to apex (avoids serving the same page twice) ────────────────
[[redirects]]
  from = "https://www.scintillating-valkyrie-aacee9.netlify.app/*"
  to = "https://scintillating-valkyrie-aacee9.netlify.app/:splat"
  status = 301
  force = true
